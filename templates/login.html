<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Pantry Pal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-deep:#1B4332; --green-mid:#2D6A4F; --green-fresh:#52B788;
      --cream:#FEFAE0; --gold:#E9C46A; --white:#FFFFFF;
      --text:#1A1A2E; --muted:#6B7280; --border:#D8F3DC;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 60%, #40916c 100%);
      font-family:'DM Sans',sans-serif;
      display:flex; align-items:center; justify-content:center;
      padding:2rem;
    }

    .auth-wrapper {
      width:100%; max-width:420px;
    }

    /* LOGO */
    .auth-logo {
      text-align:center; margin-bottom:2rem;
      animation: fadeDown 0.6s ease;
    }
    .auth-logo h1 {
      font-family:'Playfair Display',serif;
      font-size:2.2rem; color:var(--green-fresh);
    }
    .auth-logo h1 span { color:var(--gold); }
    .auth-logo p { color:#b7e4c7; font-size:0.9rem; margin-top:0.3rem; }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* CARD */
    .auth-card {
      background:var(--white);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .auth-card-header {
      background:var(--green-deep);
      padding:1.5rem 2rem;
      text-align:center;
    }
    .auth-card-header h2 {
      font-family:'Playfair Display',serif;
      color:var(--green-fresh); font-size:1.4rem;
    }
    .auth-card-header p { color:#b7e4c7; font-size:0.85rem; margin-top:0.3rem; }

    .auth-body { padding:2rem; }

    .form-group { margin-bottom:1.2rem; }
    label {
      display:block; font-size:0.8rem; font-weight:700;
      color:var(--muted); text-transform:uppercase;
      letter-spacing:0.5px; margin-bottom:0.4rem;
    }
    input {
      width:100%; padding:0.85rem 1rem;
      border:1.5px solid var(--border); border-radius:10px;
      font-size:0.95rem; font-family:'DM Sans',sans-serif;
      color:var(--text); outline:none; background:#f9fafb;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color:var(--green-fresh);
      box-shadow:0 0 0 3px rgba(82,183,136,0.15);
      background:var(--white);
    }

    .btn-auth {
      width:100%; background:var(--green-fresh); color:var(--green-deep);
      border:none; padding:0.9rem; border-radius:10px;
      font-size:1rem; font-weight:700; font-family:'DM Sans',sans-serif;
      cursor:pointer; transition:all 0.2s; margin-top:0.5rem;
      letter-spacing:0.5px;
    }
    .btn-auth:hover { background:#74c69d; transform:translateY(-1px); }

    .error-msg {
      background:#FEE2E2; color:#B91C1C; border:1px solid #FECACA;
      padding:0.75rem 1rem; border-radius:8px; font-size:0.85rem;
      margin-bottom:1rem; text-align:center;
    }

    .auth-footer {
      text-align:center; padding:1.2rem 2rem;
      border-top:1px solid var(--border);
      background:#f9fafb;
    }
    .auth-footer p { font-size:0.88rem; color:var(--muted); }
    .auth-footer a {
      color:var(--green-mid); font-weight:700;
      text-decoration:none; transition:color 0.2s;
    }
    .auth-footer a:hover { color:var(--green-fresh); }

    .divider {
      display:flex; align-items:center; gap:1rem; margin:1.2rem 0;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .divider span { font-size:0.8rem; color:var(--muted); }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-logo">
    <h1>🥬 Pantry<span>Pal</span></h1>
    <p>Your AI Cooking Assistant</p>
  </div>

  <div class="auth-card">
    <div class="auth-card-header">
      <h2>Welcome Back! 👋</h2>
      <p>Login to access your pantry</p>
    </div>

    <div class="auth-body">
      {% if error %}
      <div class="error-msg">❌ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>📧 Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <input type="password" name="password" placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn-auth">🚀 Login to Pantry Pal</button>
      </form>
    </div>

    <div class="auth-footer">
      <p>Don't have an account? <a href="/register">Sign up free →</a></p>
    </div>
  </div>
</div>

</body>
</html>
